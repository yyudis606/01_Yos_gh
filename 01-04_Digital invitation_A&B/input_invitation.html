<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Undangan Digital Batman & Batgirl</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1a1a2e;
      --secondary: #16213e;
      --accent: #e94560;
      --accent-light: #ff6b9d;
      --text-light: #f0f0f0;
      --gold: #d4af37;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: var(--text-light);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Loading Screen */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(212, 175, 55, 0.3);
      border-top: 4px solid var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Scroll to top button */
    .scroll-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      z-index: 100;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    .scroll-top.show {
      display: flex;
    }

    .scroll-top:hover {
      background: var(--accent-light);
      transform: translateY(-3px);
    }

    /* Container */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header dengan efek animasi */
    .header {
      text-align: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem;
      font-weight: 700;
      margin: 20px 0;
      background: linear-gradient(135deg, var(--gold) 0%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
    }

    .header .subtitle {
      font-size: 1rem;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 300;
    }

    .header .date-label {
      font-size: 1.1rem;
      color: var(--accent-light);
      margin-top: 15px;
    }

    /* Input Section */
    .input-section {
      <!DOCTYPE html>
      <html lang="id">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Masukkan Nama - Undangan Batman & Batgirl</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <style>
          body{font-family:Poppins,system-ui;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#f0f0f0;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
          .box{background:rgba(255,255,255,0.04);padding:28px;border-radius:12px;max-width:420px;width:100%;text-align:center}
          input{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#fff;margin-bottom:12px}
          .btn{padding:12px 16px;border-radius:8px;border:none;cursor:pointer}
          .btn-primary{background:#e94560;color:#fff;width:100%;font-weight:600}
          .small{font-size:0.9rem;color:rgba(255,255,255,0.8);margin-top:10px}
        </style>
      </head>
      <body>
        <div class="box">
          <h2>Masukkan Nama Anda</h2>
          <p class="small">Nama akan diteruskan ke halaman undangan utama.</p>
          <input id="guestInput" placeholder="Masukkan nama Anda" />
          <button class="btn btn-primary" id="goBtn">Buka Undangan</button>
          <p class="small">Atau <a href="invitation_digital.html" style="color:#ffd479">buka undangan</a> langsung (tanpa nama).</p>
        </div>

        <script>
          const input = document.getElementById('guestInput');
          const btn = document.getElementById('goBtn');
          // prefill if stored
          const stored = localStorage.getItem('invitationGuest');
          if(stored) input.value = stored;
          btn.addEventListener('click', ()=>{
            const v = (input.value||'Tamu Istimewa').trim();
            localStorage.setItem('invitationGuest', v);
            const url = 'invitation_digital.html?guest=' + encodeURIComponent(v);
            window.location.href = url;
          });
          // allow Enter
          input.addEventListener('keydown', e=>{ if(e.key==='Enter') btn.click(); });
        </script>
      </body>
      </html>
    .input-group input:focus,
